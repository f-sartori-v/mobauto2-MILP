schema:
  name: mobauto2_milp_config
  version: 3

run:
  name: default
  log_level: INFO
  seed: 42

data:
  demand_file: setups/base.yaml

model:
  time:
    T_minutes: 660
    slot_resolution: 1
    trip_duration_minutes: 30
  fleet:
    Q: 3
    initial_battery: [150.0, 150.0, 150.0]
    initial_actions: [IDL, IDL, IDL]
  energy:
    Emax: 150
    L: 30
    delta_chg: 70 / (60 / slot_resolution)
  costs:
    start_cost_epsilon: 0.01
    concurrency_penalty: 0.25

milp:
  use_fifo_symmetry: true
  symmetry_breaking: true
  use_mip_start: true
  solve_time_limit_s: 36000
  mipgap: 0.01
  solver_backend: cplex_direct
  cplex_options:
    CPXPARAM_MIP_Strategy_Symmetry: 5
    CPXPARAM_Threads: 0

service:
  S: 15
  Wmax_minutes: 60
  p: 50.0
  fill_first_epsilon: 1.0e-6

solver:
  solver_tee: false
